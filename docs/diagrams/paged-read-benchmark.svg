<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="52" font-size="32" font-weight="700" fill="#1e1b4b">The number the kernel has to beat</text>
  <text x="50" y="82" font-size="17" fill="#64748b">Per decode-step read cost vs cached history. Gather (Day 16) and fused (Day 19) are both torch, both O(history),</text>
  <text x="50" y="104" font-size="17" fill="#64748b">so they sit within noise of each other. The reference is the oracle, not the speedup. Llama-3.2-1B shapes, CPU, fp32.</text>

  <!-- ================= LEFT CHART: read cost vs history (log-log) ================= -->
  <text x="150" y="140" font-size="18" font-weight="700" fill="#0f172a">read cost per step (ms) vs history length (log-log)</text>

  <!-- axes -->
  <line x1="150" y1="160" x2="150" y2="500" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="150" y1="500" x2="760" y2="500" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- y gridlines + labels (log10: 0.1, 1, 10 ms) -->
  <line x1="150" y1="373.1" x2="760" y2="373.1" stroke="#eef2f7" stroke-width="1"/>
  <line x1="150" y1="246.2" x2="760" y2="246.2" stroke="#eef2f7" stroke-width="1"/>
  <text x="142" y="504" font-size="12" fill="#94a3b8" text-anchor="end">0.1</text>
  <text x="142" y="377" font-size="12" fill="#94a3b8" text-anchor="end">1</text>
  <text x="142" y="250" font-size="12" fill="#94a3b8" text-anchor="end">10</text>
  <text x="95" y="330" font-size="13" fill="#64748b" text-anchor="middle" transform="rotate(-90 95 330)">ms / step</text>

  <!-- x labels (log2-even: 16,64,256,1024,4096) -->
  <text x="150" y="520" font-size="12" fill="#64748b" text-anchor="middle">16</text>
  <text x="302.5" y="520" font-size="12" fill="#64748b" text-anchor="middle">64</text>
  <text x="455" y="520" font-size="12" fill="#64748b" text-anchor="middle">256</text>
  <text x="607.5" y="520" font-size="12" fill="#64748b" text-anchor="middle">1024</text>
  <text x="760" y="520" font-size="12" fill="#64748b" text-anchor="middle">4096</text>
  <text x="455" y="542" font-size="13" fill="#64748b" text-anchor="middle">cached history (tokens)</text>

  <!-- gather line (slightly faster) -->
  <polyline points="150,484.6 302.5,461.8 455,416.6 607.5,274.1 760,181.3" fill="none" stroke="#15803d" stroke-width="3"/>
  <circle cx="150" cy="484.6" r="5" fill="#15803d"/>
  <circle cx="302.5" cy="461.8" r="5" fill="#15803d"/>
  <circle cx="455" cy="416.6" r="5" fill="#15803d"/>
  <circle cx="607.5" cy="274.1" r="5" fill="#15803d"/>
  <circle cx="760" cy="181.3" r="5" fill="#15803d"/>
  <text x="668" y="232" font-size="14" font-weight="700" fill="#15803d">gather</text>

  <!-- fused line (tracks it, tiny reference overhead) -->
  <polyline points="150,483.0 302.5,461.6 455,406.2 607.5,259.1 760,181.5" fill="none" stroke="#4338ca" stroke-width="3" stroke-dasharray="7,4"/>
  <circle cx="150" cy="483.0" r="5" fill="#4338ca"/>
  <circle cx="302.5" cy="461.6" r="5" fill="#4338ca"/>
  <circle cx="455" cy="406.2" r="5" fill="#4338ca"/>
  <circle cx="607.5" cy="259.1" r="5" fill="#4338ca"/>
  <circle cx="760" cy="181.5" r="5" fill="#4338ca"/>
  <text x="540" y="252" font-size="14" font-weight="700" fill="#4338ca">fused</text>

  <!-- value callouts -->
  <text x="150" y="475" font-size="11.5" font-weight="600" fill="#334155" text-anchor="middle">0.13</text>
  <text x="455" y="398" font-size="11.5" font-weight="600" fill="#334155" text-anchor="middle">0.45</text>
  <text x="607.5" y="300" font-size="11.5" font-weight="600" fill="#334155" text-anchor="middle">6.0</text>
  <text x="760" y="173" font-size="12" font-weight="700" fill="#b91c1c" text-anchor="middle">32 ms</text>

  <!-- floor annotation -->
  <text x="200" y="470" font-size="11.5" fill="#94a3b8" font-style="italic">~0.13 ms fixed floor</text>

  <!-- ================= RIGHT PANEL: what the curve says ================= -->
  <rect x="830" y="150" width="320" height="176" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="852" y="182" font-size="16" font-weight="700" fill="#1e1b4b">Where the cost lives</text>
  <text x="852" y="210" font-size="13.5" fill="#475569">Short context: a fixed ~0.13 ms floor,</text>
  <text x="852" y="230" font-size="13.5" fill="#475569">projection and softmax overhead.</text>
  <text x="852" y="256" font-size="13.5" fill="#475569">Long context: the O(history) read wins.</text>
  <text x="852" y="276" font-size="13.5" fill="#475569">4x the history from 1k to 4k costs</text>
  <text x="852" y="296" font-size="13.5" fill="#475569">5.4x the time: 6.0 ms becomes 32 ms.</text>
  <text x="852" y="316" font-size="13" fill="#94a3b8">Every step re-reads the whole cache.</text>

  <rect x="830" y="344" width="320" height="150" rx="12" fill="#eef2ff" stroke="#4338ca" stroke-width="1.5"/>
  <text x="852" y="376" font-size="16" font-weight="700" fill="#1e1b4b">The kernel's job</text>
  <text x="852" y="404" font-size="13.5" fill="#3730a3">Gather and fused tie because both</text>
  <text x="852" y="424" font-size="13.5" fill="#3730a3">stream K/V through torch the same way.</text>
  <text x="852" y="450" font-size="13.5" fill="#3730a3">The Triton kernel bends the long-context</text>
  <text x="852" y="470" font-size="13.5" fill="#3730a3">end of this line down, fusing the read</text>
  <text x="852" y="490" font-size="13.5" fill="#3730a3">and score into one pass over the blocks.</text>

  <text x="50" y="600" font-size="13" fill="#475569">Best-of-400 timings, warmups discarded. The read is timed alone; the shared write is folded into a one-time prefill.</text>
  <text x="50" y="622" font-size="13" fill="#475569">Both closures are asserted byte-equal before timing, the Day 18 and Day 19 invariant, so only their speed is compared.</text>

  <text x="50" y="655" font-size="13.5" fill="#94a3b8">nanoserve &#183; Day 20 &#183; readbench.py + src/nanoserve/readbench.py &#183; paged read, Llama-3.2-1B shapes on CPU &#183; O(history) per step</text>
</svg>
