  <text x="985" y="461" font-size="11" fill="#94a3b8" text-anchor="middle">blk 8: free</text>
  <text x="1095" y="461" font-size="11" fill="#94a3b8" text-anchor="middle">blk 9: free</text>

  <text x="50" y="484" font-size="12.5" fill="#64748b">A's fourth block is 6, not 3: B and C took the next free ones first. Physical order is allocation order, and no row can name a block it does not own.</text>

  <!-- ===== bottom: the three lessons ===== -->
  <rect x="50" y="498" width="356" height="86" rx="10" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="70" y="522" font-size="14" font-weight="700" fill="#14532d">the key mask became a context length</text>
  <text x="70" y="543" font-size="12" fill="#166534">No pad is ever written to the pool, so the decode read</text>
  <text x="70" y="561" font-size="12" fill="#166534">is never told which keys are fake, only how many are</text>
  <text x="70" y="579" font-size="12" fill="#166534">real: context_lens[i]. One vector replaces the mask.</text>

  <rect x="422" y="498" width="356" height="86" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="442" y="522" font-size="14" font-weight="700" fill="#7c2d12">the padding must still be a legal index</text>
  <text x="442" y="543" font-size="12" fill="#9a3412">The reference gathers the whole rectangle and then</text>
  <text x="442" y="561" font-size="12" fill="#9a3412">masks it, so a pad entry really is dereferenced. A -1</text>
  <text x="442" y="579" font-size="12" fill="#9a3412">would wrap onto the pool's last slot, in silence.</text>

  <rect x="794" y="498" width="356" height="86" rx="10" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="814" y="522" font-size="14" font-weight="700" fill="#4c1d95">all rows fit, or none of them moves</text>
  <text x="814" y="543" font-size="12" fill="#6d28d9">One table's append is atomic. With N, rows 0 and 1</text>
  <text x="814" y="561" font-size="12" fill="#6d28d9">can grow and row 2 find the pool dry, so the batch's</text>
  <text x="814" y="579" font-size="12" fill="#6d28d9">whole block demand is checked before anything moves.</text>

  <!-- bottom banner -->
  <rect x="50" y="596" width="1100" height="62" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="70" y="621" font-size="14" font-weight="700" fill="#92400e">The bill static batching still pays: a row that has emitted EOS keeps its query, slot and block until the batch's slowest row finishes.</text>
  <text x="70" y="643" font-size="13" fill="#78350f">Week 8's iteration-level scheduler is what lets a finished row leave and a waiting request take its place mid-flight. 239 tests green.</text>
</svg>
