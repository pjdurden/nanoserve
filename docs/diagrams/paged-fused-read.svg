<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowB" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#047857"/>
    </marker>
    <marker id="arrowI" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3730a3"/>
    </marker>
    <marker id="arrowG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="52" font-size="30" font-weight="700" fill="#1e1b4b">The fused paged read, wired into attention</text>
  <text x="50" y="84" font-size="18" fill="#64748b">gqa_attention hands the paged cache Q/K/V and takes the attention output back. No contiguous history rebuilt.</text>

  <!-- ============ gqa_attention (left) hands Q/K/V in ============ -->
  <rect x="50" y="270" width="228" height="150" rx="10" fill="#eef2ff" stroke="#3730a3" stroke-width="2"/>
  <text x="164" y="304" font-size="17" font-weight="700" fill="#1e1b4b" text-anchor="middle">gqa_attention</text>
  <text x="164" y="330" font-size="13" fill="#475569" text-anchor="middle">project + RoPE this step</text>
  <text x="164" y="356" font-size="13.5" fill="#3730a3" text-anchor="middle" font-weight="600">q  [1, n_q, seq_q, d]</text>
  <text x="164" y="378" font-size="13.5" fill="#047857" text-anchor="middle" font-weight="600">k, v  [1, n_kv, seq_q, d]</text>
  <text x="164" y="404" font-size="12.5" fill="#94a3b8" text-anchor="middle">stores compact K/V; repeat is a read-time view</text>

  <!-- ============ block pool (center) ============ -->
  <text x="454" y="150" font-size="16" font-weight="600" fill="#334155">Block pool  [num_slots, n_kv, d]</text>
  <g font-size="12" text-anchor="middle">
    <!-- block 2 : positions p0..p3 -->
    <text x="524" y="176" font-size="12" fill="#475569">block 2</text>
    <rect x="454" y="186" width="44" height="38" rx="5" fill="#eef2ff" stroke="#3730a3" stroke-width="1.5"/><text x="476" y="210" fill="#1e1b4b">p0</text>
    <rect x="502" y="186" width="44" height="38" rx="5" fill="#eef2ff" stroke="#3730a3" stroke-width="1.5"/><text x="524" y="210" fill="#1e1b4b">p1</text>
    <rect x="550" y="186" width="44" height="38" rx="5" fill="#eef2ff" stroke="#3730a3" stroke-width="1.5"/><text x="572" y="210" fill="#1e1b4b">p2</text>
    <rect x="598" y="186" width="44" height="38" rx="5" fill="#eef2ff" stroke="#3730a3" stroke-width="1.5"/><text x="620" y="210" fill="#1e1b4b">p3</text>
    <!-- block 0 : positions p4,p5 + free -->
    <text x="524" y="248" font-size="12" fill="#475569">block 0</text>
    <rect x="454" y="258" width="44" height="38" rx="5" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/><text x="476" y="282" fill="#064e3b">p4</text>
    <rect x="502" y="258" width="44" height="38" rx="5" fill="#ecfdf5" stroke="#047857" stroke-width="1.5"/><text x="524" y="282" fill="#064e3b">p5</text>
    <rect x="550" y="258" width="44" height="38" rx="5" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/><text x="572" y="282" fill="#713f12">p6</text>
    <rect x="598" y="258" width="44" height="38" rx="5" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/><text x="620" y="282" fill="#94a3b8">free</text>
  </g>
  <text x="454" y="322" font-size="13" fill="#94a3b8">block_ids = [2, 0]: scattered. p6 is this step's write, scattered to its slot.</text>

  <!-- gqa hands K/V into the pool (write), and query into both read lanes -->
  <path d="M278,330 C360,300 400,270 452,258" fill="none" stroke="#047857" stroke-width="2" marker-end="url(#arrowB)"/>
  <text x="330" y="286" font-size="12.5" fill="#047857" font-weight="600">write k,v</text>

  <!-- ============ TOP LANE: Day 16 gather (dimmed) ============ -->
  <text x="772" y="150" font-size="15" font-weight="700" fill="#94a3b8">Day 16 gather read  (off the paged path now)</text>
  <rect x="720" y="168" width="420" height="94" rx="10" fill="#fafafa" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="930" y="198" font-size="14.5" font-weight="600" fill="#64748b" text-anchor="middle">reassemble contiguous history  [1, n_kv, seq, d]</text>
  <text x="930" y="222" font-size="13" fill="#94a3b8" text-anchor="middle">then a normal SDPA over it</text>
  <text x="930" y="246" font-size="12.5" fill="#94a3b8" text-anchor="middle">rebuilds the exact buffer paging exists to avoid</text>
  <path d="M642,200 C680,190 690,190 718,192" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#arrowG)"/>

  <!-- ============ BOTTOM LANE: Day 19 fused read (active) ============ -->
  <text x="720" y="360" font-size="15" font-weight="700" fill="#3730a3">Day 19 fused read  cache.paged_attention(...)</text>
  <rect x="720" y="378" width="420" height="118" rx="10" fill="#eef2ff" stroke="#3730a3" stroke-width="2"/>
  <text x="930" y="410" font-size="14.5" font-weight="600" fill="#1e1b4b" text-anchor="middle">attend over the scattered blocks in place</text>
  <text x="930" y="434" font-size="13" fill="#475569" text-anchor="middle">gather each token through slot_mapping[p], repeat_kv,</text>
  <text x="930" y="454" font-size="13" fill="#475569" text-anchor="middle">causal fp32 softmax  ( q . k&#7488; / sqrt(d) ) . v</text>
  <text x="930" y="478" font-size="12.5" fill="#3730a3" text-anchor="middle">no contiguous buffer ever built</text>
  <path d="M642,278 C680,320 690,340 718,392" fill="none" stroke="#3730a3" stroke-width="2" marker-end="url(#arrowI)"/>

  <!-- query feeds the fused read -->
  <path d="M278,372 C440,470 560,500 718,470" fill="none" stroke="#3730a3" stroke-width="1.8" stroke-dasharray="4,4" marker-end="url(#arrowI)"/>
  <text x="470" y="500" font-size="12.5" fill="#3730a3" font-weight="600">query q</text>

  <!-- ============ output (right) ============ -->
  <rect x="720" y="540" width="420" height="70" rx="10" fill="#ecfdf5" stroke="#047857" stroke-width="2"/>
  <text x="930" y="570" font-size="15" font-weight="600" fill="#064e3b" text-anchor="middle">attention output  [1, n_q, seq_q, d]</text>
  <text x="930" y="593" font-size="12.5" fill="#047857" text-anchor="middle">byte-identical either lane; gqa returns it after o_proj</text>
  <line x1="930" y1="496" x2="930" y2="538" stroke="#047857" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- bottom caption -->
  <text x="50" y="640" font-size="14" fill="#64748b">Same block pool, two reads. The fused read is byte-for-byte the gather, so every paged equality test still passes,</text>
  <text x="50" y="662" font-size="14" fill="#94a3b8">now through the new path. This is the shape a Triton kernel takes when it lands, held to the same reference.</text>
</svg>
