<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="54" font-size="32" font-weight="700" fill="#1e1b4b">The block table: logical position to physical block</text>
  <text x="50" y="86" font-size="19" fill="#64748b">one sequence is an ordered list of block ids. position p lives in block_ids[p // 16] at offset p % 16. blocks sit anywhere.</text>

  <!-- ===================== left: logical positions ===================== -->
  <text x="60" y="150" font-size="20" font-weight="600" fill="#3730a3">Logical positions</text>
  <rect x="60" y="170" width="300" height="58" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="210" y="198" font-size="15" fill="#3730a3" text-anchor="middle">tok 0 . tok 1 . ... . tok 15</text>
  <text x="210" y="218" font-size="13" fill="#6366f1" text-anchor="middle">positions 0..15</text>
  <rect x="60" y="240" width="300" height="58" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="210" y="268" font-size="15" fill="#3730a3" text-anchor="middle">tok 16 . tok 17 . ... . tok 19</text>
  <text x="210" y="288" font-size="13" fill="#6366f1" text-anchor="middle">positions 16..19</text>

  <!-- highlight position 17 -->
  <rect x="60" y="340" width="300" height="70" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="210" y="368" font-size="16" font-weight="700" fill="#c2410c" text-anchor="middle">position 17</text>
  <text x="210" y="392" font-size="14" fill="#ea580c" text-anchor="middle">17 // 16 = 1,  17 % 16 = 1</text>

  <!-- ===================== middle: the block table ===================== -->
  <text x="470" y="150" font-size="20" font-weight="600" fill="#0f766e">Block table</text>
  <rect x="470" y="170" width="230" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="585" y="195" font-size="15" font-weight="700" fill="#0f766e" text-anchor="middle">index 0  ->  block 5</text>
  <text x="585" y="216" font-size="13" fill="#0d9488" text-anchor="middle">holds positions 0..15</text>
  <rect x="470" y="240" width="230" height="58" rx="8" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="585" y="265" font-size="15" font-weight="700" fill="#0f766e" text-anchor="middle">index 1  ->  block 2</text>
  <text x="585" y="286" font-size="13" fill="#0d9488" text-anchor="middle">holds positions 16..31</text>

  <!-- arrows logical -> table -->
  <line x1="360" y1="199" x2="466" y2="199" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="269" x2="466" y2="269" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="375" x2="466" y2="285" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ===================== right: physical pool ===================== -->
  <text x="770" y="150" font-size="20" font-weight="600" fill="#3730a3">Physical pool</text>
  <!-- block 0 free -->
  <rect x="770" y="170" width="100" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="820" y="198" font-size="14" font-weight="700" fill="#475569" text-anchor="middle">block 0</text>
  <text x="820" y="220" font-size="13" fill="#94a3b8" text-anchor="middle">free</text>
  <!-- block 1 free -->
  <rect x="880" y="170" width="100" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="930" y="198" font-size="14" font-weight="700" fill="#475569" text-anchor="middle">block 1</text>
  <text x="930" y="220" font-size="13" fill="#94a3b8" text-anchor="middle">free</text>
  <!-- block 2 ours (idx 1) -->
  <rect x="990" y="170" width="100" height="64" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2.5"/>
  <text x="1040" y="198" font-size="14" font-weight="700" fill="#0e7490" text-anchor="middle">block 2</text>
  <text x="1040" y="220" font-size="13" fill="#0891b2" text-anchor="middle">pos 16..31</text>
  <!-- block 3 free -->
  <rect x="770" y="244" width="100" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="820" y="272" font-size="14" font-weight="700" fill="#475569" text-anchor="middle">block 3</text>
  <text x="820" y="294" font-size="13" fill="#94a3b8" text-anchor="middle">free</text>
  <!-- block 4 free -->
  <rect x="880" y="244" width="100" height="64" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="930" y="272" font-size="14" font-weight="700" fill="#475569" text-anchor="middle">block 4</text>
  <text x="930" y="294" font-size="13" fill="#94a3b8" text-anchor="middle">free</text>
  <!-- block 5 ours (idx 0) -->
  <rect x="990" y="244" width="100" height="64" rx="8" fill="#cffafe" stroke="#0891b2" stroke-width="2.5"/>
  <text x="1040" y="272" font-size="14" font-weight="700" fill="#0e7490" text-anchor="middle">block 5</text>
  <text x="1040" y="294" font-size="13" fill="#0891b2" text-anchor="middle">pos 0..15</text>

  <!-- arrows table -> physical -->
  <line x1="700" y1="195" x2="986" y2="270" stroke="#0d9488" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="265" x2="986" y2="200" stroke="#0d9488" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ===================== bottom: the flat slot ===================== -->
  <rect x="60" y="470" width="1080" height="150" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="90" y="508" font-size="20" font-weight="700" fill="#1e1b4b">The flat slot: one integer Week 5 writes K/V to</text>
  <text x="90" y="544" font-size="17" fill="#334155">position 17  ->  table index 17 // 16 = 1  ->  block 2,  offset 17 % 16 = 1</text>
  <text x="90" y="574" font-size="17" fill="#334155">slot  =  block_id * block_size + offset  =  2 * 16 + 1  =  <tspan font-weight="700" fill="#c2410c">33</tspan></text>
  <text x="90" y="604" font-size="15" fill="#64748b">scattered blocks, contiguous logical view. decode appends one token mid-block and allocates nothing; a new block is pulled only at a boundary.</text>
</svg>
