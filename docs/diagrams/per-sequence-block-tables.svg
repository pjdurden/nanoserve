  <text x="264" y="305" font-size="13" font-weight="600" fill="#7c2d12" text-anchor="middle">5</text>

  <text x="50" y="336" font-size="12.5" fill="#64748b">a table is a list of physical block ids, and they need not be adjacent</text>

  <line x1="430" y1="245" x2="512" y2="245" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

