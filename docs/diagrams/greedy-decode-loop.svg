<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0d9488"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="52" font-size="32" font-weight="700" fill="#1e1b4b">Greedy decode: append the argmax, recompute, repeat</text>
  <text x="50" y="84" font-size="18" fill="#64748b">No cache yet. Every step re-runs the whole Day-8 forward over the entire growing prefix, so the run is O(n^2).</text>

  <!-- prompt -->
  <rect x="80" y="150" width="230" height="64" rx="10" fill="#eef2ff" stroke="#3730a3" stroke-width="1.5"/>
  <text x="195" y="182" font-size="16" fill="#1e1b4b" text-anchor="middle" font-weight="700">prompt ids</text>
  <text x="195" y="202" font-size="13" fill="#3730a3" text-anchor="middle">[1, seq]</text>

  <path d="M310,182 L372,182" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- forward (the whole Day-8 stack) -->
  <rect x="374" y="138" width="300" height="88" rx="12" fill="#ffffff" stroke="#b45309" stroke-width="2"/>
  <text x="524" y="170" font-size="17" fill="#7c2d12" text-anchor="middle" font-weight="700">forward( ids )  ->  logits</text>
  <text x="524" y="192" font-size="13" fill="#9a3412" text-anchor="middle">embed, 16 blocks, norm, tied head</text>
  <text x="524" y="212" font-size="12" fill="#b45309" text-anchor="middle" font-style="italic">the entire prefix, every step</text>

  <path d="M674,182 L740,182" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- argmax of last position -->
  <rect x="742" y="150" width="250" height="64" rx="10" fill="#ecfeff" stroke="#0e7490" stroke-width="1.5"/>
  <text x="867" y="178" font-size="16" fill="#155e75" text-anchor="middle" font-weight="700">argmax( logits[:, -1] )</text>
  <text x="867" y="199" font-size="13" fill="#0e7490" text-anchor="middle">next token  ·  [1]</text>

  <!-- down to append -->
  <path d="M867,214 L867,268" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- append -->
  <rect x="742" y="270" width="250" height="64" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1.6"/>
  <text x="867" y="298" font-size="16" fill="#166534" text-anchor="middle" font-weight="700">cat([ids, next])</text>
  <text x="867" y="319" font-size="13" fill="#15803d" text-anchor="middle">[1, seq] -> [1, seq+1]</text>

  <!-- loop back edge: append -> forward -->
  <path d="M742,302 L524,302 L524,226" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrowAmber)" stroke-dasharray="6 5"/>
  <text x="600" y="324" font-size="13" fill="#b45309" text-anchor="middle" font-style="italic">loop: recompute on the longer prefix</text>

  <!-- stop conditions -->
  <rect x="742" y="372" width="250" height="86" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="1.5"/>
  <text x="867" y="400" font-size="15" fill="#7f1d1d" text-anchor="middle" font-weight="700">stop when</text>
  <text x="867" y="422" font-size="13" fill="#991b1b" text-anchor="middle">emitted token == eos_id</text>
  <text x="867" y="442" font-size="13" fill="#991b1b" text-anchor="middle">or max_new_tokens reached</text>
  <path d="M867,334 L867,372" stroke="#b91c1c" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 4"/>

  <!-- verification panel -->
  <rect x="80" y="300" width="594" height="300" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="104" y="338" font-size="19" fill="#0f172a" font-weight="700">Verified token for token vs HuggingFace</text>
  <text x="104" y="366" font-size="14" fill="#475569">HF runs greedy with its own KV cache; nanoserve recomputes the prefix.</text>
  <text x="104" y="386" font-size="14" fill="#475569">Different paths, identical choices: the argmax never diverges.</text>

  <rect x="104" y="406" width="546" height="68" rx="8" fill="#eef2ff" stroke="#3730a3" stroke-width="1.2"/>
  <text x="118" y="430" font-size="13" fill="#3730a3" font-weight="700">prompt</text>
  <text x="118" y="450" font-size="15" fill="#1e1b4b" font-family="ui-monospace, Menlo, monospace">The test of a</text>
  <text x="118" y="468" font-size="11" fill="#64748b" font-family="ui-monospace, Menlo, monospace">ids [128000, 791, 1296, 315, 264]</text>

  <rect x="104" y="484" width="546" height="92" rx="8" fill="#f0fdf4" stroke="#15803d" stroke-width="1.2"/>
  <text x="118" y="508" font-size="13" fill="#166534" font-weight="700">20-token greedy continuation (mine == HF)</text>
  <text x="118" y="532" font-size="14" fill="#14532d" font-family="ui-monospace, Menlo, monospace">good leader is how well they can handle the</text>
  <text x="118" y="552" font-size="14" fill="#14532d" font-family="ui-monospace, Menlo, monospace">pressure of a crisis. The test of a good leader</text>
  <text x="118" y="570" font-size="11" fill="#15803d" font-style="italic">torch.equal on all 20 ids: True</text>

  <text x="867" y="500" font-size="13" fill="#64748b" text-anchor="middle" font-style="italic">Week 3 swaps the loop body</text>
  <text x="867" y="518" font-size="13" fill="#64748b" text-anchor="middle" font-style="italic">for a KV cache: one new-token</text>
  <text x="867" y="536" font-size="13" fill="#64748b" text-anchor="middle" font-style="italic">forward instead of the whole prefix.</text>
</svg>
