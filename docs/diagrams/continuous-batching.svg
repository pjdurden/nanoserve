<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="58" font-size="32" font-weight="700" fill="#1e1b4b">Continuous batching</text>
  <text x="50" y="90" font-size="20" fill="#64748b">schedule per decode step. requests join and leave mid-flight, the GPU stays full.</text>

  <!-- time axis -->
  <line x1="180" y1="560" x2="1120" y2="560" stroke="#94a3b8" stroke-width="2"/>
  <text x="650" y="600" font-size="16" fill="#64748b" text-anchor="middle">engine steps (time)</text>
  <g font-size="13" fill="#94a3b8" text-anchor="middle">
    <text x="180" y="585">0</text>
    <text x="274" y="585">1</text>
    <text x="368" y="585">2</text>
    <text x="462" y="585">3</text>
    <text x="556" y="585">4</text>
    <text x="650" y="585">5</text>
    <text x="744" y="585">6</text>
    <text x="838" y="585">7</text>
    <text x="932" y="585">8</text>
    <text x="1026" y="585">9</text>
  </g>
  <!-- faint step gridlines -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="274" y1="150" x2="274" y2="560"/>
    <line x1="368" y1="150" x2="368" y2="560"/>
    <line x1="462" y1="150" x2="462" y2="560"/>
    <line x1="556" y1="150" x2="556" y2="560"/>
    <line x1="650" y1="150" x2="650" y2="560"/>
    <line x1="744" y1="150" x2="744" y2="560"/>
    <line x1="838" y1="150" x2="838" y2="560"/>
    <line x1="932" y1="150" x2="932" y2="560"/>
    <line x1="1026" y1="150" x2="1026" y2="560"/>
  </g>

  <!-- request bars: x = 180 + step*94 -->
  <!-- req 1: steps 0-7 -->
  <rect x="180" y="160" width="658" height="44" rx="8" fill="#c7d2fe" stroke="#3730a3" stroke-width="2"/>
  <text x="200" y="188" font-size="15" font-weight="600" fill="#1e1b4b">request 1</text>
  <text x="820" y="188" font-size="12" fill="#3730a3" text-anchor="end">done</text>

  <!-- req 2: steps 2-6 -->
  <rect x="368" y="225" width="376" height="44" rx="8" fill="#bbf7d0" stroke="#047857" stroke-width="2"/>
  <text x="388" y="253" font-size="15" font-weight="600" fill="#064e3b">request 2</text>
  <text x="726" y="253" font-size="12" fill="#047857" text-anchor="end">done</text>

  <!-- req 3: steps 4-9 -->
  <rect x="556" y="290" width="470" height="44" rx="8" fill="#fde68a" stroke="#b45309" stroke-width="2"/>
  <text x="576" y="318" font-size="15" font-weight="600" fill="#7c2d12">request 3</text>
  <text x="1008" y="318" font-size="12" fill="#b45309" text-anchor="end">done</text>

  <!-- req 4: steps 5-8 -->
  <rect x="650" y="355" width="282" height="44" rx="8" fill="#fbcfe8" stroke="#9d174d" stroke-width="2"/>
  <text x="670" y="383" font-size="15" font-weight="600" fill="#831843">request 4</text>
  <text x="914" y="383" font-size="12" fill="#9d174d" text-anchor="end">done</text>

  <!-- arrival markers -->
  <g font-size="12" fill="#475569" text-anchor="middle">
    <text x="368" y="445">req 2 joins</text>
    <text x="556" y="465">req 3 joins</text>
    <text x="650" y="485">req 4 joins</text>
  </g>
  <g stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3">
    <line x1="368" y1="269" x2="368" y2="435"/>
    <line x1="556" y1="334" x2="556" y2="455"/>
    <line x1="650" y1="399" x2="650" y2="475"/>
  </g>

  <text x="180" y="640" font-size="15" fill="#475569">no head-of-line blocking: a new request does not wait for the batch to drain, and a finished one frees its KV blocks immediately.</text>
  <text x="1150" y="665" font-size="14" fill="#94a3b8" text-anchor="end">nanoserve · an AI inference engine from scratch</text>
</svg>
