  <text x="1140" y="615" font-size="14" fill="#64748b" text-anchor="end">pair 31 (slowest)</text>
  <line x1="70" y1="387.0" x2="1140" y2="387.0" stroke="#b45309" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="1140" y="379.0" font-size="13" fill="#b45309" text-anchor="end">high_freq_wavelen = 2048</text>
