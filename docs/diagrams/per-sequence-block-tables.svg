  <text x="368" y="205" font-size="13" font-weight="600" fill="#1e1b4b" text-anchor="middle">6</text>

  <text x="50" y="255" font-size="14" font-weight="600" fill="#14532d">seq B: 3 tokens</text>
  <rect x="190" y="232" width="44" height="34" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1.8"/>
  <rect x="242" y="232" width="44" height="34" rx="6" fill="#ecfdf5" stroke="#15803d" stroke-width="1.8"/>
  <text x="212" y="255" font-size="13" font-weight="600" fill="#14532d" text-anchor="middle">3</text>
  <text x="264" y="255" font-size="13" font-weight="600" fill="#14532d" text-anchor="middle">7</text>

  <text x="50" y="305" font-size="14" font-weight="600" fill="#7c2d12">seq C: 4 tokens</text>
  <rect x="190" y="282" width="44" height="34" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.8"/>
  <rect x="242" y="282" width="44" height="34" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.8"/>
