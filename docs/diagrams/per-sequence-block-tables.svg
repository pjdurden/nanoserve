  <text x="560" y="322" font-size="12.5" fill="#64748b">rectangular only here, because a kernel wants one tensor with a stride.</text>
  <text x="560" y="340" font-size="12.5" fill="#64748b">The dashed cells are inert padding: gathered, then killed by context_lens.</text>

