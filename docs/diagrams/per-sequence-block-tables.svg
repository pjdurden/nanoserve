  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="52" font-size="32" font-weight="700" fill="#1e1b4b">One pool, one block table per sequence</text>
  <text x="50" y="82" font-size="17" fill="#64748b">Day 27 batched the prefill and stopped: the paged cache had one block table, so a batch could not say whose blocks were whose.</text>
  <text x="50" y="104" font-size="17" fill="#64748b">Give each row its own table over one shared pool and the decode step batches too: ragged in the cache, rectangular only to read.</text>

  <!-- ===== left: three tables ===== -->
  <text x="50" y="148" font-size="14" font-weight="700" fill="#334155">three sequences, three block tables</text>

  <text x="50" y="205" font-size="14" font-weight="600" fill="#1e1b4b">seq A: 7 tokens</text>
