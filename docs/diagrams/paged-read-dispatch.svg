<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="50" y="52" font-size="32" font-weight="700" fill="#1e1b4b">The paged read dispatches to its backend</text>
  <text x="50" y="82" font-size="17" fill="#64748b">Through Day 24 the cache's fused read called the byte-exact torch reference. Day 25 routes it through select_backend:</text>
  <text x="50" y="104" font-size="17" fill="#64748b">the Triton kernel on a card, the tlsim model on a laptop. The reference steps back to being the oracle, not the path.</text>

  <!-- ===== top: the cache read ===== -->
  <rect x="360" y="140" width="480" height="70" rx="12" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="600" y="170" font-size="18" font-weight="700" fill="#1e1b4b" text-anchor="middle">PagedKVCache.paged_attention(layer, k, v, q, n_rep)</text>
  <text x="600" y="194" font-size="13.5" fill="#475569" text-anchor="middle">_write the K/V, then slot_mapping = every logical position 0..seq_len-1</text>

  <!-- arrow down to dispatcher -->
  <line x1="600" y1="210" x2="600" y2="248" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- dispatcher pill -->
  <rect x="440" y="250" width="320" height="58" rx="29" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
  <text x="600" y="278" font-size="17" font-weight="700" fill="#7c2d12" text-anchor="middle">select_backend(q.device)</text>
  <text x="600" y="298" font-size="12.5" fill="#9a3412" text-anchor="middle">a jitted kernel cannot address host memory</text>

  <!-- branch arrows + labels -->
  <line x1="505" y1="308" x2="300" y2="374" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="345" y="336" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">cuda &amp; has_triton()</text>
  <line x1="695" y1="308" x2="900" y2="374" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="850" y="336" font-size="13" font-weight="600" fill="#334155" text-anchor="middle">else</text>

  <!-- left backend: triton -->
  <rect x="95" y="376" width="345" height="96" rx="12" fill="#ecfdf5" stroke="#15803d" stroke-width="2"/>
  <text x="267" y="406" font-size="17" font-weight="700" fill="#14532d" text-anchor="middle">paged_attention_triton</text>
  <text x="267" y="430" font-size="12.5" fill="#166534" text-anchor="middle">@triton.jit, one program per (query, head)</text>
  <text x="267" y="449" font-size="12.5" fill="#166534" text-anchor="middle">tiles stream HBM to SRAM, fp32 online softmax</text>
  <text x="267" y="465" font-size="11.5" fill="#64748b" text-anchor="middle">the fast path, only where a GPU exists</text>

  <!-- right backend: tlsim -->
  <rect x="760" y="376" width="345" height="96" rx="12" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="932" y="406" font-size="17" font-weight="700" fill="#1e3a8a" text-anchor="middle">paged_attention_kernel (tlsim)</text>
  <text x="932" y="430" font-size="12.5" fill="#1e40af" text-anchor="middle">the same loop on the CPU, masked gather per tile</text>
  <text x="932" y="449" font-size="12.5" fill="#1e40af" text-anchor="middle">correct and slow, runs on any laptop</text>
  <text x="932" y="465" font-size="11.5" fill="#64748b" text-anchor="middle">the model, not a fast path</text>

  <!-- oracle box, centered between the two backends -->
  <rect x="458" y="392" width="284" height="64" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="600" y="418" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">paged_attention_reference</text>
  <text x="600" y="440" font-size="12.5" fill="#64748b" text-anchor="middle">torch SDPA over the slots, the oracle</text>

  <!-- dashed grading arrows from both backends to the oracle -->
  <line x1="442" y1="424" x2="456" y2="424" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowg)"/>
  <line x1="758" y1="424" x2="744" y2="424" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowg)"/>
  <text x="600" y="474" font-size="12" fill="#94a3b8" text-anchor="middle" font-style="italic">both held to it: allclose, atol 1e-5</text>

  <!-- converge to output -->
  <line x1="267" y1="472" x2="505" y2="516" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="932" y1="472" x2="695" y2="516" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="520" width="360" height="58" rx="12" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="600" y="548" font-size="16" font-weight="700" fill="#4c1d95" text-anchor="middle">[1, n_q, seq, head_dim] attention output</text>
  <text x="600" y="568" font-size="12.5" fill="#6d28d9" text-anchor="middle">back to gqa_attention, before o_proj</text>

  <!-- bottom banner: the trade -->
  <rect x="110" y="602" width="980" height="52" rx="10" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="130" y="626" font-size="14" font-weight="700" fill="#92400e">Day 24: the model ran the byte-exact reference (torch.equal).</text>
  <text x="130" y="645" font-size="13" fill="#78350f">Day 25: it runs the streaming softmax, so paged is flash-close to naive (~7e-6), not bit-identical: the flash-attention accuracy trade.</text>
</svg>
